services:
  amail:
    image: sunwuyuan/amail:main
    container_name: amail
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - amail-data:/data
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - ADMIN_TOKEN=${ADMIN_TOKEN:-change-me-to-a-secure-random-string}
      - DB_PATH=/data/amail.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-8c7cdf448f207ed5f52ff43e0e91bf44c9181e4e1f21e77008e82a1b066c2ad4}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s

volumes:
  amail-data:
