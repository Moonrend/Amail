name: Publish npm Package

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write   # Required for npm provenance (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --workspaces --if-present

      - name: Publish @wydev/amail
        run: cd packages/amail && npm publish --provenance --access public

      - name: Publish @wydev/amail-cli
        run: cd packages/cli && npm publish --provenance --access public
